name: PR Tests

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  api-tests:
    name: API tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: apps/api/pyproject.toml

      - name: Check for API project
        id: api_project
        run: |
          if [ -s apps/api/pyproject.toml ]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "apps/api/pyproject.toml is empty, so API tests are not available yet."
          fi

      - name: Install Python deps
        if: steps.api_project.outputs.available == 'true'
        working-directory: apps/api
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .

      - name: Run tests
        if: steps.api_project.outputs.available == 'true'
        working-directory: apps/api
        run: |
          python -m pytest
