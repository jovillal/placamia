name: PR Tests

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  api-tests:
    name: API tests
    runs-on: ubuntu-latest
    env:
      TEST_POSTGRES_DATABASE_URL: postgresql+psycopg2://placamia:placamia@localhost:5432/placamia_test

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: placamia
          POSTGRES_PASSWORD: placamia
          POSTGRES_DB: placamia_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U placamia -d placamia_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check for API project
        id: api_project
        run: |
          if [ -s apps/api/pyproject.toml ]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "apps/api/pyproject.toml is empty, so API tests are not available yet."
          fi

      - name: Set up Python
        if: steps.api_project.outputs.available == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: apps/api/pyproject.toml

      - name: Install Python deps
        if: steps.api_project.outputs.available == 'true'
        working-directory: apps/api
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .

      - name: Run tests
        if: steps.api_project.outputs.available == 'true'
        working-directory: apps/api
        run: |
          python -m pytest
