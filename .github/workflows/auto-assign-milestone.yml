name: Auto assign milestone

on:
  issues:
    types: [opened, edited]

permissions:
  contents: read
  issues: write

jobs:
  assign:
    runs-on: ubuntu-latest

    steps:
      - name: Set milestone based on title
        uses: actions/github-script@v7
        with:
          script: |
            const title = context.payload.issue.title.toLowerCase();

            let milestone = "Foundation";

            if (title.includes("security")) milestone = "Security";
            else if (title.includes("catalog")) milestone = "Catalog";
            else if (title.includes("template") || title.includes("design")) milestone = "Templates & Designs";
            else if (title.includes("kit")) milestone = "Kits";
            else if (title.includes("pricing") || title.includes("quote")) milestone = "Pricing";
            else if (title.includes("checkout") || title.includes("order")) milestone = "Orders";
            else if (title.includes("doc") || title.includes("diagram")) milestone = "Docs";
            else if (title.includes("mobile")) milestone = "Mobile Placeholder";

            const milestones = await github.paginate(github.rest.issues.listMilestones, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: "open",
            });

            const match = milestones.find(m => m.title === milestone);

            if (match) {
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.issue.number,
                milestone: match.number
              });
            }
